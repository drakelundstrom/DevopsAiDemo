name: Deploy Static Web App

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  deploy_infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    outputs:
      static_web_app_name: ${{ steps.bicep.outputs.staticWebAppName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        shell: bash
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy Bicep
        id: bicep
        shell: bash
        run: |
          DEPLOYMENT=$(az deployment group create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file ./infra/main.bicep \
            --parameters ./infra/main.bicepparam \
            --output json)
          APP_NAME=$(echo "$DEPLOYMENT" | jq -r '.properties.outputs.staticWebAppName.value')
          echo "staticWebAppName=$APP_NAME" >> "$GITHUB_OUTPUT"

  deploy_app:
    name: Deploy App Content
    runs-on: ubuntu-latest
    needs: deploy_infra
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Azure Login
        shell: bash
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Azure Static Web Apps
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ needs.deploy_infra.outputs.static_web_app_name }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" \
            --output tsv)
          swa deploy ./code --deployment-token "$TOKEN"

  close_pull_request:
    name: Close Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Azure Login
        shell: bash
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Delete Pull Request Environment
        shell: bash
        run: |
          az staticwebapp environment delete \
            --name "${{ vars.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --environment-name "pr-${{ github.event.number }}" \
            --yes
